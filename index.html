<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0f19" />
    <meta
      name="description"
      content="Yerel AI çalıştırmak mantıklı mı? Model, donanım, runtime ve maliyet karşılaştırmaları ile veri odaklı bir fizibilite analizi."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!--
      FOUC-guard: React yüklenmeden önce localStorage veya sistem tercihine
      göre 'dark' class'ını uygular. Bu sayede aydınlık/karanlık geçişinde
      kısa süreli yanlış-tema parlaması (flash) yaşanmaz.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("localai:theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var useDark = stored === "dark" || (!stored && prefersDark) || (!stored && !window.matchMedia);
          if (useDark) document.documentElement.classList.add("dark");
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <title>LocalAI Fizibilite Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
